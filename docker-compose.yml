# docker-compose.yml (ROOT)
version: '3.9'

services:
  # ─────────────────────────────────────────
  # PostgreSQL 15 with PostGIS
  # ─────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: glowfix-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: glowfix
      POSTGRES_PASSWORD: glowfix_dev_password
      POSTGRES_DB: glowfix_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U glowfix -d glowfix_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # PostgreSQL Test Database (separate from dev)
  # ─────────────────────────────────────────
  postgres_test:
    image: postgis/postgis:15-3.4-alpine
    container_name: glowfix_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_DB: glowfix_test
      POSTGRES_USER: glowfix
      POSTGRES_PASSWORD: glowfix_dev_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # in-memory for fast tests
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glowfix -d glowfix_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - glowfix_network

  # ─────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: glowfix-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MailHog (local email testing)
  # UI at http://localhost:8025
  # ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: glowfix_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI
    networks:
      - glowfix_network


  # ─────────────────────────────────────────
  # Redis Commander (Redis UI)
  # UI at http://localhost:8081
  # ─────────────────────────────────────────
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: glowfix_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:glowfix_redis_password"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - glowfix_network

# ─────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────
# Network
# ─────────────────────────────────────────
networks:
  glowfix_network:
    driver: bridge
    name: glowfix_network